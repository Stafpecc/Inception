<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>tarini.42.fr — Status</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			font-family: 'Courier New', monospace;
			background: #0a0a0a;
			color: #e0e0e0;
			min-height: 100vh;
			padding: 2rem;
		}

		header {
			text-align: center;
			margin-bottom: 3rem;
		}

		header h1 {
			font-size: 1.8rem;
			color: #00babc;
			letter-spacing: 4px;
			text-transform: uppercase;
		}

		header p {
			color: #444;
			font-size: 0.8rem;
			letter-spacing: 2px;
			margin-top: 0.5rem;
		}

		.overall {
			text-align: center;
			margin-bottom: 2.5rem;
		}

		.overall-badge {
			display: inline-block;
			padding: 0.6rem 2rem;
			border-radius: 2px;
			font-size: 0.85rem;
			letter-spacing: 3px;
			text-transform: uppercase;
			font-weight: bold;
		}

		.all-good { background: #0d2b0d; color: #4caf50; border: 1px solid #4caf50; }
		.degraded { background: #2b1a0d; color: #ff9800; border: 1px solid #ff9800; }
		.outage   { background: #2b0d0d; color: #f44336; border: 1px solid #f44336; }

		.grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
			gap: 1rem;
			max-width: 1000px;
			margin: 0 auto;
		}

		.card {
			background: #111;
			border: 1px solid #1a1a1a;
			padding: 1.4rem 1.6rem;
			display: flex;
			align-items: center;
			justify-content: space-between;
			border-left: 4px solid #333;
			transition: border-color 0.3s;
		}

		.card.up   { border-left-color: #4caf50; }
		.card.down { border-left-color: #f44336; }
		.card.loading { border-left-color: #555; }

		.card-info h3 {
			font-size: 0.95rem;
			letter-spacing: 2px;
			text-transform: uppercase;
			margin-bottom: 0.3rem;
		}

		.card-info span {
			font-size: 0.7rem;
			color: #444;
			letter-spacing: 1px;
		}

		.dot {
			width: 14px;
			height: 14px;
			border-radius: 50%;
			background: #333;
			flex-shrink: 0;
		}

		.dot.up   { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
		.dot.down { background: #f44336; box-shadow: 0 0 8px #f44336; animation: pulse 1s infinite; }

		@keyframes pulse {
			0%, 100% { opacity: 1; }
			50% { opacity: 0.4; }
		}

		footer {
			text-align: center;
			margin-top: 3rem;
			color: #333;
			font-size: 0.7rem;
			letter-spacing: 2px;
		}

		#updated {
			color: #333;
			font-size: 0.7rem;
			text-align: center;
			margin-bottom: 2rem;
			letter-spacing: 1px;
		}
	</style>
</head>
<body>
	<header>
		<h1>tarini.42.fr</h1>
		<p>INCEPTION INFRASTRUCTURE STATUS</p>
	</header>

	<div class="overall">
		<div class="overall-badge" id="overall">Checking...</div>
	</div>

	<div id="updated">Last updated: —</div>

	<div class="grid" id="grid"></div>

	<footer>Refreshes every 30s · tarini.42.fr · Inception 2026</footer>

	<script>
		const LABELS = {
			mariadb:   { name: 'MariaDB',    desc: 'Database · port 3306' },
			wordpress: { name: 'WordPress',  desc: 'PHP-FPM · port 9000' },
			nginx:     { name: 'Nginx',      desc: 'Reverse proxy · port 443' },
			redis:     { name: 'Redis',      desc: 'Cache · port 6379' },
			adminer:   { name: 'Adminer',    desc: 'DB UI · port 9001' },
			ftp:       { name: 'FTP',        desc: 'vsftpd · port 21' },
		};

		async function fetchStatus() {
			try {
				const res = await fetch('/status.json?t=' + Date.now());
				const data = await res.json();
				render(data);
			} catch (e) {
				document.getElementById('overall').textContent = 'Unavailable';
				document.getElementById('overall').className = 'overall-badge outage';
			}
		}

		function render(data) {
			const grid = document.getElementById('grid');
			const services = data.services || {};
			const values = Object.values(services);
			const allUp = values.every(s => s.status === 'up');
			const allDown = values.every(s => s.status === 'down');
			const overall = document.getElementById('overall');

			if (values.length === 0) {
				overall.textContent = 'Booting...';
				overall.className = 'overall-badge degraded';
			} else if (allUp) {
				overall.textContent = '✓ All Systems Operational';
				overall.className = 'overall-badge all-good';
			} else if (allDown) {
				overall.textContent = '✗ Major Outage';
				overall.className = 'overall-badge outage';
			} else {
				overall.textContent = '⚠ Partial Outage';
				overall.className = 'overall-badge degraded';
			}

			document.getElementById('updated').textContent =
				'Last updated: ' + (data.updated === 'booting' ? 'booting...' : new Date(data.updated).toLocaleTimeString());

			grid.innerHTML = '';
			for (const [key, info] of Object.entries(services)) {
				const label = LABELS[key] || { name: key, desc: `port ${info.port}` };
				const card = document.createElement('div');
				card.className = `card ${info.status}`;
				card.innerHTML = `
					<div class="card-info">
						<h3>${label.name}</h3>
						<span>${label.desc}</span>
					</div>
					<div class="dot ${info.status}"></div>
				`;
				grid.appendChild(card);
			}
		}

		fetchStatus();
		setInterval(fetchStatus, 30000);
	</script>
</body>
</html>
