<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Site Statique</title>
	<style>
		body {
			font-family: monospace;
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			margin: 0;
			background: #f9f9f9;
			color: #222;
		}
		.box {
			text-align: center;
			padding: 3rem;
			border: 1px solid #ddd;
			background: white;
		}
		h1 { font-size: 2rem; margin-bottom: 0.5rem; }
		p { color: #666; font-size: 0.9rem; }
		.tag {
			display: inline-block;
			margin-top: 1.5rem;
			font-size: 0.7rem;
			letter-spacing: 2px;
			color: #aaa;
			text-transform: uppercase;
			border: 1px solid #eee;
			padding: 0.3rem 0.8rem;
		}
	</style>
</head>
<body>
	<div class="box">
		<h1>👋 Hello</h1>
		<p>I am a static site.<br>No PHP, just true skills</p>
		<div class="tag">tarini.42.fr — Inception Project</div>
	</div>
</body>
</html>
