user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	sendfile on;
	keepalive_timeout 65;

	server {
		listen 443 ssl;
		listen [::]:443 ssl;

		server_name tarini.42.fr;

		ssl_certificate     /etc/nginx/ssl/tarini.42.fr.crt;
		ssl_certificate_key /etc/nginx/ssl/tarini.42.fr.key;
		ssl_protocols       TLSv1.2 TLSv1.3;

		root /var/www/html;
		index index.php index.html;

		# WordPress
		location / {
			try_files $uri $uri/ /index.php?$args;
		}

		location ~ \.php$ {
			fastcgi_pass wordpress:9000;
			fastcgi_index index.php;
			fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
			include fastcgi_params;
		}

		# Adminer
		location ^~ /adminer {
			fastcgi_pass adminer:9001;
			fastcgi_param SCRIPT_FILENAME /var/www/adminer/index.php;
			fastcgi_param SCRIPT_NAME /adminer;
			include fastcgi_params;
		}

		# Static portfolio site
		location ^~ /static {
			proxy_pass http://static:80;
			proxy_set_header Host $host;
			proxy_set_header X-Real-IP $remote_addr;
		}
	}
}